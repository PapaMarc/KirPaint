<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Credentials — KirPaint</title>
    <link rel="stylesheet" href="glightbox/glightbox.min.css">
    <link rel="stylesheet" href="glightbox/glightbox.custom.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .credentials-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 24px 0 30px;
        }

        .credentials-nav a {
            background: white;
            border-radius: 8px;
            padding: 10px 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            font-weight: 600;
            transition: transform .18s ease, box-shadow .18s ease, background-color .18s ease, color .18s ease;
        }

        .credentials-nav a.is-active {
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        .credentials-nav a:hover,
        .credentials-nav a:focus-visible {
            animation: cred-nav-jog .45s ease-in-out infinite alternate;
        }

        @keyframes cred-nav-jog {
            0% {
                transform: translateY(0) translateX(0);
            }

            100% {
                transform: translateY(-2px) translateX(2px);
            }
        }

        .credentials-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .credentials-hero {
            background-image: url('/images/certs/10hrOSHA.jpg');
        }

        .cred-section ul {
            list-style: disc;
            margin-left: 20px;
            text-align: left;
        }

        .cred-section li {
            margin: 0 0 8px;
        }

        .cred-section li.cred-outline-2 {
            margin-left: 1.25rem;
            list-style-type: circle;
        }

        .cred-group {
            color: var(--muted);
            font-size: .92rem;
            font-style: italic;
        }

        .cred-lightbox-card {
            background: white;
            color: var(--dark);
            max-width: 720px;
            margin: 0 auto;
            padding: 26px;
            border-radius: 10px;
            text-align: left;
        }

        .cred-lightbox-card h3 {
            color: var(--accent);
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <nav class="topnav">
        <div class="container nav-inner">
            <a class="logo" href="/">KirPaint</a>
            <a class="logo" href="/index.html#certs">← Back</a>
        </div>
    </nav>

    <header class="hero-hero credentials-hero">
        <div class="container">
            <h1>Training, Certifications, and Other Recognition</h1>
            <p class="lead">Credentials, memberships and accolades supporting KirPaint’s industry expertise.</p>
        </div>
    </header>

    <main>
        <section>
            <div class="container">
                <h2>Credentials</h2>
                <p class="section-subtitle"></p>

                <div class="credentials-nav" aria-label="Credential sections">
                    <a href="#certs">Certifications</a>
                    <a href="#memberships">Memberships</a>
                    <a href="#accolades">Accolades</a>
                </div>

                <div id="credentials-grid" class="credentials-grid"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; KirPaint | All Rights Reserved | Website Created by <a href="https://merware.com">MerWare</a></p>
        </div>
    </footer>

    <script src="glightbox/glightbox.min.js"></script>
    <script src="js/credentials.js"></script>
    <script src="glightbox/glightbox-init.js"></script>
</body>

</html>
